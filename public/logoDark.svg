<svg xmlns="http://www.w3.org/2000/svg" width="260" height="48" viewBox="0 0 260 48">
  <title>SpottedHQ logo — dark theme</title>
  <defs>
    <style>
      .wm-main { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 22px; font-weight: 600; fill: #f0eff8; letter-spacing: -0.5px; }
      .wm-hq   { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 22px; font-weight: 600; fill: #AFA9EC; letter-spacing: -0.5px; }
    </style>
  </defs>

  <!-- Pin icon -->
  <g transform="translate(0, 2)">
    <path d="M18 0 C8.1 0 0 8.1 0 18 C0 27.9 7.7 34.3 18 44.5 C28.3 34.3 36 27.9 36 18 C36 8.1 27.9 0 18 0Z" fill="#3C3489" stroke="#AFA9EC" stroke-width="1.2"/>
    <circle cx="18" cy="18" r="4.5" fill="#26215C" opacity="0.8"/>
    <!-- bars -->
    <rect x="7" y="22" width="4" height="6" rx="1" fill="#AFA9EC"/>
    <rect x="13" y="17" width="4" height="11" rx="1" fill="#CECBF6"/>
    <rect x="19" y="13" width="4" height="15" rx="1" fill="#f0eff8"/>
    <rect x="25" y="15" width="4" height="13" rx="1" fill="#CECBF6"/>
    <!-- spark -->
    <circle cx="27" cy="9" r="2" fill="#CECBF6"/>
    <circle cx="27" cy="9" r="1" fill="#3C3489"/>
    <line x1="29" y1="7" x2="32" y2="5" stroke="#CECBF6" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="30" y1="9" x2="33" y2="8" stroke="#CECBF6" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
    <line x1="29" y1="11" x2="32" y2="13" stroke="#CECBF6" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
  </g>

  <!-- Wordmark -->
  <text x="44" y="33" dominant-baseline="auto">
    <tspan class="wm-main">Spotted</tspan><tspan class="wm-hq">HQ</tspan>
  </text>
</svg>